openapi: 3.0.3

info:
  title: Career OS API
  description: |
    Career OS is an AI-powered career development platform.

    This API provides endpoints for:

    - Authentication
    - User Profiles
    - Resume Analysis
    - GitHub Analysis
    - AI Career Roadmaps
    - AI Chat
    - Interview Preparation
    - Progress Tracking

  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development

  - url: https://api.careeros.com/api/v1
    description: Production

tags:
  - name: Authentication
    description: User authentication and authorization

  - name: Profile
    description: User profile management

  - name: Dashboard
    description: Dashboard analytics

  - name: Resume
    description: Resume upload and analysis

  - name: GitHub
    description: GitHub integration

  - name: Roadmap
    description: AI-generated career roadmap

  - name: Projects
    description: Project recommendation engine

  - name: Chat
    description: AI Career Assistant

  - name: Interview
    description: Interview preparation

  - name: Goals
    description: Progress tracking

paths:

  /auth/register:

    post:

      tags:
        - Authentication

      summary: Register a new user

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/RegisterRequest'

      responses:

        "201":

          description: User registered successfully

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/AuthSuccess'

        "400":

          description: Validation Error

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'

        "409":

          description: Email already exists

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:

    post:

      tags:
        - Authentication

      summary: Login

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/LoginRequest'

      responses:

        "200":

          description: Login successful

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/LoginSuccess'

        "401":

          description: Invalid credentials

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'

  /auth/profile:

    get:

      tags:
        - Authentication

      summary: Get authenticated user profile

      security:

        - bearerAuth: []

      responses:

        "200":

          description: User profile

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ProfileResponse'

        "401":

          description: Unauthorized

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'

components:

  securitySchemes:

    bearerAuth:

      type: http

      scheme: bearer

      bearerFormat: JWT

  schemas:

    RegisterRequest:

      type: object

      required:

        - name
        - email
        - password

      properties:

        name:

          type: string

          example: Khadija

        email:

          type: string

          example: khadija@gmail.com

        password:

          type: string

          example: Password123

    LoginRequest:

      type: object

      required:

        - email
        - password

      properties:

        email:

          type: string

        password:

          type: string

    AuthSuccess:

      type: object

      properties:

        success:

          type: boolean

          example: true

        message:

          type: string

          example: Registration successful

        data:

          type: object

          properties:

            id:

              type: string

            name:

              type: string

            email:

              type: string

    LoginSuccess:

      type: object

      properties:

        success:

          type: boolean

          example: true

        message:

          type: string

          example: Login successful

        token:

          type: string

        user:

          type: object

    ProfileResponse:

      type: object

      properties:

        success:

          type: boolean

        data:

          type: object

          properties:

            id:

              type: string

            name:

              type: string

            email:

              type: string

            careerGoal:

              type: string

    ErrorResponse:

      type: object

      properties:

        success:

          type: boolean

          example: false

        message:

          type: string

        errors:

          type: array

          items:

            type: object

            properties:

              field:

                type: string

              message:

                type: string
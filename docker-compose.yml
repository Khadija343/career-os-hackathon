services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      CLIENT_URL: http://localhost:5174
    depends_on:
      - ai-service
    volumes:
      - backend-uploads:/app/uploads

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ALLOWED_ORIGINS: http://localhost:5174,http://localhost:5000

volumes:
  backend-uploads:
